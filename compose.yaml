version: "3.9"

networks:
  app-network:
    driver: bridge

services:
  web-db:
    image: postgres:16
    networks:
      - app-network
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: K0rmaVindal00!!
      POSTGRES_DB: StarTrekWeatherDB
    ports:
      - "5434:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./StarTrekWeather/StarTrekWeather_create.sql:/docker-entrypoint-initdb.d/StarTrekWeather_create.sql

  web:
    build:
      context: ./StarTrekWeather
      dockerfile: Dockerfile
    networks:
      - app-network
    depends_on:
      - web-db
    environment:
      ConnectionStrings__DefaultConnection: "Host=web-db;Port=5432;Database=StarTrekWeatherDB;Username=postgres;Password=K0rmaVindal00!!"
      PlanetApi__BaseUrl: "http://api:8080"
    env_file:
      - .env
    ports:
      - "5001:8080"

  api-db:
    image: postgres:16
    networks:
      - app-network
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: K0rmaVindal00!!
      POSTGRES_DB: StarTrekAPIDB
    ports:
      - "5433:5432"
    volumes:
      - api_pg_data:/var/lib/postgresql/data
      - ./StarTrekWeatherAPI/StarTrekWeatherAPI_create.sql:/docker-entrypoint-initdb.d/StarTrekWeatherAPI_create.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      retries: 5

  api:
    build:
      context: ./StarTrekWeatherAPI
      dockerfile: Dockerfile
    networks:
      - app-network
    depends_on:
      api-db:
        condition: service_healthy
    environment:
      ConnectionStrings__DefaultConnection: "Host=api-db;Port=5432;Database=StarTrekAPIDB;Username=postgres;Password=K0rmaVindal00!!"
      PublicBaseUrl: "http://localhost:5002"
    ports:
      - "5002:8080"

  # The other team's Pokemon Locations API + DB, merged into our stack so a
  # single `podman compose up --build` brings up the full set. Requires the
  # `pokemon-locations` repo cloned alongside SE498-Capstone (i.e. at
  # `../pokemon-locations`) and the dev HTTPS cert at ~/.aspnet/https/aspnetapp.pfx
  # (one-time setup via `dotnet dev-certs https`).
  pokemon-locations-db:
    image: postgres:17
    networks:
      - app-network
    shm_size: 128mb
    environment:
      POSTGRES_DB: pokemonlocations
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: example
    volumes:
      - pokemon_locations_pg_data:/var/lib/postgresql/data
      - ../pokemon-locations/WebServer/Database/Init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d pokemonlocations"]
      interval: 2s
      timeout: 3s
      retries: 15

  pokemon-locations-api:
    build:
      context: ../pokemon-locations/Backend
      dockerfile: PokemonLocations.Api/Dockerfile
    networks:
      - app-network
    depends_on:
      pokemon-locations-db:
        condition: service_healthy
    environment:
      ConnectionStrings__Postgres: "Host=pokemon-locations-db;Port=5432;Database=pokemonlocations;Username=postgres;Password=example"
      ASPNETCORE_URLS: "http://+:8080;https://+:8081"
      ASPNETCORE_Environment: Development
      ASPNETCORE_Kestrel__Certificates__Default__Password: password
      ASPNETCORE_Kestrel__Certificates__Default__Path: /https/aspnetapp.pfx
      Jwt__Key: "local-dev-jwt-key-must-be-at-least-32-bytes-long-for-hs256!"
      Jwt__Issuer: pokemon-locations-api
      Jwt__Audience: pokemon-locations-clients
    volumes:
      - ~/.aspnet/https:/https:ro
    ports:
      - "8082:8080"

volumes:
  pg_data:
  api_pg_data:
  pokemon_locations_pg_data: